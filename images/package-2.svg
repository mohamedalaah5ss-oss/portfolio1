<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#091e2c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg2)" rx="10"/>
  <g stroke="#1a4a5a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
  </g>
  <!-- Source A -->
  <rect x="30" y="60" width="70" height="45" rx="6" fill="#00e5c8" opacity="0.1" stroke="#00e5c8" stroke-width="1.5"/>
  <text x="65" y="78" text-anchor="middle" fill="#00e5c8" font-size="9" font-family="monospace">SOURCE A</text>
  <line x1="40" y1="88" x2="90" y2="88" stroke="#00e5c8" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="96" x2="75" y2="96" stroke="#00e5c8" stroke-width="1" opacity="0.5"/>
  <!-- Source B -->
  <rect x="30" y="120" width="70" height="45" rx="6" fill="#00e5c8" opacity="0.1" stroke="#00e5c8" stroke-width="1.5"/>
  <text x="65" y="138" text-anchor="middle" fill="#00e5c8" font-size="9" font-family="monospace">SOURCE B</text>
  <line x1="40" y1="148" x2="90" y2="148" stroke="#00e5c8" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="156" x2="75" y2="156" stroke="#00e5c8" stroke-width="1" opacity="0.5"/>
  <!-- Join lines -->
  <line x1="100" y1="82" x2="175" y2="112" stroke="#00e5c8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="100" y1="142" x2="175" y2="112" stroke="#00e5c8" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Join node -->
  <circle cx="185" cy="112" r="18" fill="#00e5c8" opacity="0.15" stroke="#00e5c8" stroke-width="2"/>
  <text x="185" y="116" text-anchor="middle" fill="#00e5c8" font-size="11" font-weight="bold" font-family="monospace">JOIN</text>
  <!-- Arrow -->
  <line x1="204" y1="112" x2="240" y2="112" stroke="#00e5c8" stroke-width="2"/>
  <polygon points="240,107 250,112 240,117" fill="#00e5c8"/>
  <!-- Schema box -->
  <rect x="255" y="70" width="110" height="85" rx="6" fill="#00e5c8" opacity="0.07" stroke="#00e5c8" stroke-width="1.5"/>
  <text x="310" y="88" text-anchor="middle" fill="#00e5c8" font-size="9" font-family="monospace" opacity="0.9">SCHEMA</text>
  <line x1="265" y1="94" x2="355" y2="94" stroke="#00e5c8" stroke-width="1" opacity="0.5"/>
  <rect x="265" y="100" width="40" height="8" rx="2" fill="#00e5c8" opacity="0.3"/>
  <rect x="265" y="114" width="55" height="8" rx="2" fill="#00e5c8" opacity="0.2"/>
  <rect x="265" y="128" width="35" height="8" rx="2" fill="#00e5c8" opacity="0.25"/>
  <rect x="265" y="142" width="60" height="8" rx="2" fill="#00e5c8" opacity="0.15"/>
  <text x="200" y="178" text-anchor="middle" fill="#00e5c8" font-family="monospace" font-size="11" opacity="0.7">STANDARD · TWO SOURCES + JOIN</text>
</svg>