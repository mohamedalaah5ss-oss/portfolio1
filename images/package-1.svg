<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2d3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1f2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b4a0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)" rx="10"/>
  <!-- Grid lines -->
  <g stroke="#1a4a5a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
  </g>
  <!-- Database cylinder -->
  <ellipse cx="140" cy="85" rx="38" ry="12" fill="#00e5c8" opacity="0.15"/>
  <rect x="102" y="85" width="76" height="50" fill="#00e5c8" opacity="0.08" rx="2"/>
  <ellipse cx="140" cy="135" rx="38" ry="12" fill="#00e5c8" opacity="0.1"/>
  <ellipse cx="140" cy="85" rx="38" ry="12" fill="none" stroke="#00e5c8" stroke-width="2"/>
  <line x1="102" y1="85" x2="102" y2="135" stroke="#00e5c8" stroke-width="2"/>
  <line x1="178" y1="85" x2="178" y2="135" stroke="#00e5c8" stroke-width="2"/>
  <ellipse cx="140" cy="135" rx="38" ry="12" fill="none" stroke="#00e5c8" stroke-width="2"/>
  <!-- Inner lines -->
  <line x1="102" y1="100" x2="178" y2="100" stroke="#00e5c8" stroke-width="1" opacity="0.4"/>
  <line x1="102" y1="115" x2="178" y2="115" stroke="#00e5c8" stroke-width="1" opacity="0.4"/>
  <!-- Arrow -->
  <line x1="195" y1="110" x2="235" y2="110" stroke="#00e5c8" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="235,105 245,110 235,115" fill="#00e5c8"/>
  <!-- Gear/transform icon -->
  <circle cx="275" cy="110" r="22" fill="#00e5c8" opacity="0.08" stroke="#00e5c8" stroke-width="1.5"/>
  <circle cx="275" cy="110" r="10" fill="none" stroke="#00e5c8" stroke-width="2"/>
  <circle cx="275" cy="110" r="4" fill="#00e5c8"/>
  <g stroke="#00e5c8" stroke-width="3" stroke-linecap="round">
    <line x1="275" y1="88" x2="275" y2="94"/>
    <line x1="275" y1="126" x2="275" y2="132"/>
    <line x1="253" y1="110" x2="259" y2="110"/>
    <line x1="291" y1="110" x2="297" y2="110"/>
  </g>
  <!-- Check mark -->
  <circle cx="340" cy="65" r="14" fill="#00e5c8" opacity="0.15" stroke="#00e5c8" stroke-width="1.5"/>
  <polyline points="333,65 338,71 348,58" fill="none" stroke="#00e5c8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="200" y="175" text-anchor="middle" fill="#00e5c8" font-family="monospace" font-size="11" opacity="0.7">STARTER · SINGLE SOURCE</text>
</svg>